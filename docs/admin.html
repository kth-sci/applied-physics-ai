<!-- Login gate -->
<div id="login-gate" style="max-width:24rem;margin:6rem auto;padding:2rem;text-align:center">
  <div style="width:56px;height:56px;background:#eef2ff;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>

    Sign In

<!-- Dashboard (hidden until login) -->

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem">
      <div>
        <h1 style="font-size:1.75rem;font-weight:800;color:#0f172a;margin:0">Admin Dashboard</h1>
        <p style="color:#64748b;font-size:0.875rem;margin:0.25rem 0 0">Analytics, feedback, submissions, and event registrations.</p>

      <button onclick="loadAll()" style="background:#f1f5f9;color:#475569;font-weight:500;padding:0.4rem 1rem;border-radius:8px;border:1px solid #e2e8f0;cursor:pointer;font-size:0.82rem;font-family:inherit">
        Refresh All
      </button>
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:1.5rem;overflow-x:auto">
      <button id="tab-pageviews-btn" onclick="switchAdminTab('pageviews')" style="padding:0.6rem 1.2rem;border:none;border-bottom:2px solid #6366f1;margin-bottom:-2px;background:none;font-family:inherit;font-size:0.875rem;font-weight:600;color:#0f172a;cursor:pointer;white-space:nowrap">Page Views</button>
      <button id="tab-feedback-btn" onclick="switchAdminTab('feedback')" style="padding:0.6rem 1.2rem;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;font-family:inherit;font-size:0.875rem;color:#94a3b8;cursor:pointer;white-space:nowrap">Page Feedback</button>
      <button id="tab-submissions-btn" onclick="switchAdminTab('submissions')" style="padding:0.6rem 1.2rem;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;font-family:inherit;font-size:0.875rem;color:#94a3b8;cursor:pointer;white-space:nowrap">Gallery Submissions</button>
      <button id="tab-community-btn" onclick="switchAdminTab('community')" style="padding:0.6rem 1.2rem;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;font-family:inherit;font-size:0.875rem;color:#94a3b8;cursor:pointer;white-space:nowrap">Community Messages</button>
      <button id="tab-attendees-btn" onclick="switchAdminTab('attendees')" style="padding:0.6rem 1.2rem;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;font-family:inherit;font-size:0.875rem;color:#94a3b8;cursor:pointer;white-space:nowrap">May 8 Attendees</button>
    </div>

    <!-- Page Views analytics -->
    <div id="tab-pageviews" style="display:flex;flex-direction:column;gap:1.5rem">
      <div style="text-align:center;padding:3rem;color:#94a3b8">Loading analytics...</div>
    </div>

    <!-- Feedback list -->
    <div id="tab-feedback" style="display:none;flex-direction:column;gap:0.75rem">
      <div style="text-align:center;padding:3rem;color:#94a3b8">Loading feedback...</div>
    </div>

    <!-- Gallery submissions list -->
    <div id="tab-submissions" style="display:none;flex-direction:column;gap:0.75rem">
      <div style="text-align:center;padding:3rem;color:#94a3b8">Loading submissions...</div>
    </div>

    <!-- Community Messages -->
    <div id="tab-community" style="display:none;flex-direction:column;gap:0.75rem">
      <div style="text-align:center;padding:3rem;color:#94a3b8">Loading messages...</div>
    </div>

    <!-- Attendees list -->
    <div id="tab-attendees" style="display:none;flex-direction:column;gap:0.75rem">
      <div style="text-align:center;padding:3rem;color:#94a3b8">Loading attendees...</div>
    </div>
  </div>
</div>

<script>
const HYPHA = 'https://hypha.aicell.io';
const FEEDBACK_URL = `${HYPHA}/kth-sci/artifacts/aphys-ai-feedback/children`;
const GALLERY_URL = `${HYPHA}/kth-sci/artifacts/aphys-ai-gallery/children`;
const REG_URL = `${HYPHA}/kth-sci/artifacts/aphys-ai-registrations/children`;
const COMM_URL = `${HYPHA}/kth-sci/artifacts/aphys-ai-community/children`;
const NAV_URL = `${HYPHA}/kth-sci/artifacts/aphys-ai-navigation/children`;
const PAGES = ['index','getting-started','chatgpt-quickstart','ai-agents','gallery','events','community'];
const PAGE_LABELS = {index:'Home', 'getting-started':'Getting Started', 'chatgpt-quickstart':'ChatGPT Guide', 'ai-agents':'AI Agents', gallery:'Gallery', events:'Events', community:'Community'};
const NODE_LABELS = {index:'Home', 'getting-started':'Getting\nStarted', 'chatgpt-quickstart':'ChatGPT', 'ai-agents':'AI Agents', gallery:'Gallery', events:'Events', community:'Community'};
const ADMIN_PASS = 'aphys2026';
const SESSION_ID = '53be87cd-3c5a-4899-b792-b78821590dee';
const TOKEN = sessionStorage.getItem('hypha-token') || '';

// Login
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  const pass = document.getElementById('login-pass').value;
  if (pass === ADMIN_PASS) {
    document.getElementById('login-gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    sessionStorage.setItem('admin-auth', '1');
    loadAll();
  } else {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    err.textContent = 'Incorrect passphrase. Hint: department + year.';
  }
}

// Auto-login if already authed this session
if (sessionStorage.getItem('admin-auth')) {
  document.getElementById('login-gate').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadAll();
}

function loadAll() { loadPageViews(); loadFeedback(); loadSubmissions(); loadCommunity(); loadAttendees(); }

const adminTabs = ['pageviews', 'feedback', 'submissions', 'community', 'attendees'];
function switchAdminTab(tab) {
  adminTabs.forEach(t => {
    const panel = document.getElementById('tab-' + t);
    const btn = document.getElementById('tab-' + t + '-btn');
    if (panel) panel.style.display = t === tab ? 'flex' : 'none';
    if (btn) {
      btn.style.borderBottomColor = t === tab ? '#6366f1' : 'transparent';
      btn.style.color = t === tab ? '#0f172a' : '#94a3b8';
      btn.style.fontWeight = t === tab ? '600' : '400';
    }
  });
}

// ===== PAGE VIEWS ANALYTICS =====
async function loadPageViews() {
  const container = document.getElementById('tab-pageviews');
  container.innerHTML = '<div style="text-align:center;padding:3rem;color:#94a3b8">Loading analytics...</div>';

  try {
    // 1. Fetch view counts for all pages
    const viewPromises = PAGES.map(p =>
      fetch(`${HYPHA}/kth-sci/artifacts/views-${p}?silent=true`).then(r=>r.json()).catch(()=>({view_count:0}))
    );
    const viewData = await Promise.all(viewPromises);
    const views = {};
    let totalViews = 0;
    PAGES.forEach((p,i) => { views[p] = Math.round(viewData[i].view_count||0); totalViews += views[p]; });

    // 2. Fetch navigation data
    const navRes = await fetch(`${NAV_URL}?pagination=true&limit=1000&silent=true`);
    const navData = await navRes.json();
    const navItems = navData.items || [];

    // Aggregate transitions
    const transitions = {}; // "from→to" => count
    const sessions = new Set();
    const sessionPages = {}; // sid => [pages]
    navItems.forEach(item => {
      const m = item.manifest || {};
      const from = m.from || 'external';
      const to = m.to || '?';
      const key = from + '→' + to;
      transitions[key] = (transitions[key] || 0) + 1;
      if (m.session) {
        sessions.add(m.session);
        if (!sessionPages[m.session]) sessionPages[m.session] = [];
        sessionPages[m.session].push(to);
      }
    });

    // 3. Calculate churn & dropout
    const sessionList = Object.values(sessionPages);
    const totalSessions = sessionList.length;
    const singlePageSessions = sessionList.filter(s => s.length <= 1).length;
    const bounceRate = totalSessions > 0 ? Math.round(singlePageSessions / totalSessions * 100) : 0;
    const avgPages = totalSessions > 0 ? (sessionList.reduce((a,s) => a+s.length, 0) / totalSessions).toFixed(1) : '0';

    // Exit pages (last page in each session)
    const exitCounts = {};
    sessionList.forEach(s => { if(s.length) { const last = s[s.length-1]; exitCounts[last]=(exitCounts[last]||0)+1; }});

    // Entry pages (from external)
    const entryCounts = {};
    navItems.forEach(item => {
      const m = item.manifest||{};
      if (m.from === 'external' && m.to) entryCounts[m.to] = (entryCounts[m.to]||0)+1;
    });

    // 4. Render
    const maxViews = Math.max(...Object.values(views), 1);

    // Sort pages by views descending
    const sortedPages = [...PAGES].sort((a,b) => (views[b]||0) - (views[a]||0));

    let html = '';

    // ── Stats row ──
    html += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem">
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:1rem;text-align:center">
        <div style="font-size:1.75rem;font-weight:800;color:#0f172a">${totalViews.toLocaleString()}</div>
        <div style="font-size:0.72rem;color:#94a3b8;font-weight:500;text-transform:uppercase;letter-spacing:0.05em">Total Page Views</div>
      </div>
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:1rem;text-align:center">
        <div style="font-size:1.75rem;font-weight:800;color:#6366f1">${totalSessions.toLocaleString()}</div>
        <div style="font-size:0.72rem;color:#6366f1;font-weight:500;text-transform:uppercase;letter-spacing:0.05em">Sessions</div>
      </div>
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:1rem;text-align:center">
        <div style="font-size:1.75rem;font-weight:800;color:#f97316">${bounceRate}%</div>
        <div style="font-size:0.72rem;color:#f97316;font-weight:500;text-transform:uppercase;letter-spacing:0.05em">Bounce Rate</div>
      </div>
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:1rem;text-align:center">
        <div style="font-size:1.75rem;font-weight:800;color:#10b981">${avgPages}</div>
        <div style="font-size:0.72rem;color:#10b981;font-weight:500;text-transform:uppercase;letter-spacing:0.05em">Avg Pages / Session</div>
      </div>
    </div>`;

    // ── Bar chart ──
    html += `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.5rem">
      <h3 style="font-size:1rem;font-weight:700;color:#0f172a;margin:0 0 1rem">Page Views</h3>
      <div style="display:flex;flex-direction:column;gap:0.6rem">`;
    sortedPages.forEach(p => {
      const v = views[p] || 0;
      const pct = maxViews > 0 ? (v / maxViews * 100) : 0;
      html += `<div style="display:grid;grid-template-columns:120px 1fr 50px;gap:0.75rem;align-items:center;font-size:0.82rem">
        <span style="color:#475569;font-weight:500;text-align:right">${PAGE_LABELS[p]||p}</span>
        <div style="background:#f1f5f9;border-radius:4px;height:24px;overflow:hidden">
          <div style="background:linear-gradient(90deg,#6366f1,#818cf8);height:100%;width:${pct}%;border-radius:4px;transition:width 0.5s"></div>
        </div>
        <span style="color:#0f172a;font-weight:700;font-size:0.82rem">${v.toLocaleString()}</span>
      </div>`;
    });
    html += `</div></div>`;

    // ── Navigation Flow Network (SVG) ──
    const nodeR = 32;
    const svgW = 700, svgH = 420;
    const cx = svgW/2, cy = svgH/2;
    // Position pages in a circle + external at top
    const allNodes = ['external', ...PAGES];
    const nodePos = {};
    allNodes.forEach((n,i) => {
      if (n === 'external') {
        nodePos[n] = { x: cx, y: 40 };
      } else {
        const angle = ((i-1) / PAGES.length) * Math.PI * 2 - Math.PI/2;
        nodePos[n] = { x: cx + Math.cos(angle) * 160, y: cy + 30 + Math.sin(angle) * 140 };
      }
    });

    const maxTrans = Math.max(...Object.values(transitions), 1);
    let arrows = '';
    Object.entries(transitions).forEach(([key, count]) => {
      const [from,to] = key.split('→');
      const p1 = nodePos[from], p2 = nodePos[to];
      if (!p1 || !p2 || from === to) return;
      const thickness = Math.max(0.5, (count / maxTrans) * 3);
      const opacity = Math.max(0.08, Math.min(0.35, count / maxTrans));
      // Shorten arrow to not overlap nodes
      const dx = p2.x-p1.x, dy = p2.y-p1.y, dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 1) return;
      const ux = dx/dist, uy = dy/dist;
      const x1 = p1.x + ux*(nodeR+4), y1 = p1.y + uy*(nodeR+4);
      const x2 = p2.x - ux*(nodeR+8), y2 = p2.y - uy*(nodeR+8);
      // Draw line with rounded cap
      arrows += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#818cf8" stroke-width="${thickness}" opacity="${opacity}" stroke-linecap="round"/>`;
      // Draw arrowhead as a small triangle matching the line's opacity and color
      const ax = x2 - ux*8, ay = y2 - uy*8;
      const px1 = ax + uy*thickness*1.5, py1 = ay - ux*thickness*1.5;
      const px2 = ax - uy*thickness*1.5, py2 = ay + ux*thickness*1.5;
      arrows += `<polygon points="${x2},${y2} ${px1},${py1} ${px2},${py2}" fill="#818cf8" opacity="${opacity}"/>`;
      // Count label at midpoint
      if (count > 1) {
        const mx = (x1+x2)/2, my = (y1+y2)/2;
        arrows += `<text x="${mx}" y="${my-4}" text-anchor="middle" font-family="Inter" font-size="8" fill="#818cf8" opacity="${Math.min(opacity*1.5, 0.5)}">${count}</text>`;
      }
    });

    let nodes = '';
    allNodes.forEach(n => {
      const pos = nodePos[n];
      const isExt = n === 'external';
      const v = views[n] || 0;
      const fill = isExt ? '#94a3b8' : '#6366f1';
      const r = isExt ? 24 : Math.max(22, Math.min(38, 22 + (v/maxViews)*16));
      nodes += `<circle cx="${pos.x}" cy="${pos.y}" r="${r}" fill="${fill}" opacity="0.9"/>`;
      const label = isExt ? 'External' : (NODE_LABELS[n]||n);
      const lines = label.split('\n');
      const ly = pos.y - (lines.length-1)*5 + 2;
      nodes += lines.map((l,li) => `<text x="${pos.x}" y="${ly+li*11}" text-anchor="middle" font-family="Inter" font-size="${isExt?8:8}" font-weight="600" fill="#fff">${l}</text>`).join('');
      if (!isExt) {
        nodes += `<text x="${pos.x}" y="${pos.y + r + 14}" text-anchor="middle" font-family="Inter" font-size="10" font-weight="700" fill="#0f172a">${v}</text>`;
      }
    });

    html += `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.5rem">
      <h3 style="font-size:1rem;font-weight:700;color:#0f172a;margin:0 0 0.5rem">Navigation Flow</h3>
      <p style="font-size:0.75rem;color:#94a3b8;margin:0 0 1rem">How visitors move between pages. Arrow thickness = transition frequency. Node size = page views.</p>
      <div style="overflow-x:auto;text-align:center">
        <svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="max-width:100%">
          <!-- arrows drawn inline with matching arrowheads -->
          ${arrows}
          ${nodes}
        </svg>
      </div>
    </div>`;

    // ── Entry & Exit pages ──
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">`;

    // Entry points
    html += `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:1.25rem">
      <h3 style="font-size:0.9rem;font-weight:700;color:#166534;margin:0 0 0.75rem">Entry Points (from external)</h3>`;
    const sortedEntry = Object.entries(entryCounts).sort((a,b)=>b[1]-a[1]);
    if (sortedEntry.length) {
      sortedEntry.forEach(([p,c]) => {
        html += `<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.82rem;border-bottom:1px solid #dcfce7">
          <span style="color:#166534">${PAGE_LABELS[p]||p}</span><span style="font-weight:700;color:#166534">${c}</span></div>`;
      });
    } else { html += `<div style="color:#94a3b8;font-size:0.82rem">No data yet</div>`; }
    html += `</div>`;

    // Exit points (dropout)
    html += `<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:1.25rem">
      <h3 style="font-size:0.9rem;font-weight:700;color:#991b1b;margin:0 0 0.75rem">Dropout Pages (last page before leaving)</h3>`;
    const sortedExit = Object.entries(exitCounts).sort((a,b)=>b[1]-a[1]);
    if (sortedExit.length) {
      sortedExit.forEach(([p,c]) => {
        const dropPct = totalSessions > 0 ? Math.round(c/totalSessions*100) : 0;
        html += `<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.82rem;border-bottom:1px solid #fecaca">
          <span style="color:#991b1b">${PAGE_LABELS[p]||p}</span><span style="font-weight:700;color:#991b1b">${c} <span style="font-weight:400;opacity:0.6">(${dropPct}%)</span></span></div>`;
      });
    } else { html += `<div style="color:#94a3b8;font-size:0.82rem">No data yet</div>`; }
    html += `</div></div>`;

    // ── Churn summary ──
    html += `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.25rem">
      <h3 style="font-size:0.9rem;font-weight:700;color:#0f172a;margin:0 0 0.75rem">Session Depth Distribution</h3>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap">`;
    const depthCounts = {};
    sessionList.forEach(s => { const d = Math.min(s.length, 7); depthCounts[d] = (depthCounts[d]||0)+1; });
    const depthLabels = {1:'1 page',2:'2 pages',3:'3 pages',4:'4 pages',5:'5 pages',6:'6 pages',7:'7+ pages'};
    for (let d = 1; d <= 7; d++) {
      const c = depthCounts[d] || 0;
      const pct = totalSessions > 0 ? Math.round(c/totalSessions*100) : 0;
      const bg = d === 1 ? '#fef2f2' : d <= 2 ? '#fffbeb' : '#f0fdf4';
      const color = d === 1 ? '#991b1b' : d <= 2 ? '#92400e' : '#166534';
      html += `<div style="background:${bg};border-radius:8px;padding:0.5rem 1rem;text-align:center;min-width:80px">
        <div style="font-size:1.1rem;font-weight:800;color:${color}">${c}</div>
        <div style="font-size:0.65rem;color:${color};opacity:0.7">${depthLabels[d]} (${pct}%)</div>
      </div>`;
    }
    html += `</div></div>`;

    container.innerHTML = html;

  } catch(e) {
    container.innerHTML = `<div style="text-align:center;padding:3rem;color:#ef4444">Failed to load analytics: ${e.message}</div>`;
  }
}

async function loadFeedback() {
  const list = document.getElementById('tab-feedback');
  list.innerHTML = '<div style="text-align:center;padding:3rem;color:#94a3b8">Loading...</div>';

  try {
    const res = await fetch(`${FEEDBACK_URL}?pagination=true&limit=100&silent=true&order_by=-created_at`);
    const data = await res.json();
    const items = data.items || [];

    // Stats
    const ups = items.filter(i => i.manifest?.vote === 'up').length;
    const downs = items.filter(i => i.manifest?.vote === 'down').length;
    const withComments = items.filter(i => i.manifest?.comment).length;

    // Build stats + description header
    let html = `
    <div style="margin-bottom:1rem">
      <p style="font-size:0.875rem;color:#64748b;margin:0 0 1rem">All user feedback from the "Is this useful?" widget.</p>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem">
        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:0.75rem;text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:#0f172a">${items.length}</div>
          <div style="font-size:0.7rem;color:#94a3b8;font-weight:500;text-transform:uppercase;letter-spacing:0.05em">Total</div>
        </div>
        <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:0.75rem;text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:#16a34a">${ups}</div>
          <div style="font-size:0.7rem;color:#16a34a;font-weight:500;text-transform:uppercase;letter-spacing:0.05em">Thumbs Up</div>
        </div>
        <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:0.75rem;text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:#dc2626">${downs}</div>
          <div style="font-size:0.7rem;color:#dc2626;font-weight:500;text-transform:uppercase;letter-spacing:0.05em">Needs Work</div>
        </div>
        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:0.75rem;text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:#6366f1">${withComments}</div>
          <div style="font-size:0.7rem;color:#6366f1;font-weight:500;text-transform:uppercase;letter-spacing:0.05em">With Comments</div>
        </div>
      </div>
    </div>`;

    if (!items.length) {
      list.innerHTML = html + '<div style="text-align:center;padding:2rem;color:#94a3b8">No feedback yet.</div>';
      return;
    }

    list.innerHTML = html + items.map(item => {
      const m = item.manifest || {};
      const isUp = m.vote === 'up';
      const borderColor = isUp ? '#bbf7d0' : '#fecaca';
      const iconBg = isUp ? '#f0fdf4' : '#fef2f2';
      const iconColor = isUp ? '#16a34a' : '#dc2626';
      const icon = isUp
        ? '<path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/>'
        : '<path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10zM17 2h2.67A2.31 2.31 0 0122 4v7a2.31 2.31 0 01-2.33 2H17"/>';
      const ts = m.timestamp ? new Date(m.timestamp).toLocaleString() : 'Unknown time';

      return `
      <div style="background:#fff;border:1px solid ${borderColor};border-radius:10px;padding:1rem 1.25rem;display:flex;gap:1rem;align-items:flex-start">
        <div style="width:36px;height:36px;border-radius:8px;background:${iconBg};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${iconColor}" stroke-width="2">${icon}</svg>
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem">
            <span style="font-weight:600;font-size:0.875rem;color:#0f172a">${m.page || 'Unknown page'}</span>
            <span style="font-size:0.72rem;color:#94a3b8">${ts}</span>
          </div>
          ${m.comment ? `<p style="color:#475569;font-size:0.875rem;margin:0.25rem 0 0;line-height:1.5">${m.comment.replace(/</g,'&lt;')}</p>` : `<p style="color:#94a3b8;font-size:0.82rem;margin:0;font-style:italic">${isUp ? 'Positive feedback, no comment' : 'No comment provided'}</p>`}
          ${m.comment && !isUp ? `
          <button onclick="sendToAgent(this, '${m.page || 'unknown'}', \`${(m.comment||'').replace(/`/g,"'").replace(/\\/g,"\\\\")}\`)"

      </div>`;
    }).join('');

  } catch(e) {
    list.innerHTML = `<div style="text-align:center;padding:3rem;color:#ef4444">Failed to load feedback: ${e.message}</div>`;
  }
}

async function sendToAgent(btn, page, comment) {
  btn.disabled = true;
  btn.textContent = 'Sending...';
  btn.style.background = '#94a3b8';

  const message = `[Feedback Action Request] A user reported an issue on ${page}:\n\n"${comment}"\n\nPlease review this feedback and implement improvements to the page. After making changes, reply on Slack confirming what was done.`;

  try {
    // Use svamp CLI via a fetch to a local endpoint — but since we're in a browser,
    // we'll store it as an artifact that the daemon can pick up
    await fetch(HYPHA + '/public/services/artifact-manager/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        alias: 'action-' + Date.now().toString(36),
        parent_id: 'kth-sci/aphys-ai-feedback',
        manifest: {
          name: 'Action Request: ' + page,
          type: 'action-request',
          page: page,
          comment: comment,
          prompt: message,
          status: 'pending',
          timestamp: new Date().toISOString(),
          tags: ['action-request', page.replace('.html','')],
        }
      })
    });
    btn.textContent = 'Sent to Agent!';
    btn.style.background = '#059669';
  } catch(e) {
    btn.textContent = 'Failed — try again';
    btn.style.background = '#ef4444';
    btn.disabled = false;
  }
}

async function toggleSubmission(artifactId, field, value) {
  try {
    // Read current manifest
    const readRes = await fetch(`${HYPHA}/public/services/artifact-manager/read`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ artifact_id: artifactId, silent: true })
    });
    const artifact = await readRes.json();
    const manifest = { ...artifact.manifest, [field]: value };

    // Update
    await fetch(`${HYPHA}/public/services/artifact-manager/edit`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ artifact_id: artifactId, manifest })
    });
    loadSubmissions();
  } catch(e) { alert('Failed: ' + e.message); }
}

async function editSubmission(artifactId) {
  try {
    const readRes = await fetch(`${HYPHA}/public/services/artifact-manager/read`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ artifact_id: artifactId, silent: true })
    });
    const artifact = await readRes.json();
    const m = artifact.manifest;

    const newName = prompt('Title:', m.name);
    if (newName === null) return;
    const newDesc = prompt('Description:', m.description);
    if (newDesc === null) return;
    const newTool = prompt('Tool (ChatGPT / Claude Code / Both):', m.tool);
    if (newTool === null) return;

    await fetch(`${HYPHA}/public/services/artifact-manager/edit`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        artifact_id: artifactId,
        manifest: { ...m, name: newName, description: newDesc, tool: newTool }
      })
    });
    loadSubmissions();
  } catch(e) { alert('Failed: ' + e.message); }
}

      const attBg = m.attendance === 'AlbaNova' ? '#fff7ed' : '#eef2ff';
      return `<tr style="border-bottom:1px solid #f1f5f9;background:${i%2===0?'#fff':'#f8fafc'}">
        <td style="padding:0.5rem 0.75rem;color:#94a3b8">${i+1}</td>
        <td style="padding:0.5rem 0.75rem;font-weight:500;color:#0f172a">${(m.name||'?').replace(/</g,'&lt;')}</td>
        <td style="padding:0.5rem 0.75rem;color:#475569">${(m.email||'?').replace(/</g,'&lt;')}</td>
        <td style="padding:0.5rem 0.75rem"><span style="font-size:0.72rem;font-weight:600;padding:2px 8px;border-radius:4px;background:${attBg};color:${attColor}">${m.attendance||'?'}</span></td>
        <td style="padding:0.5rem 0.75rem;color:#64748b">${m.experience||'—'}</td>
        <td style="padding:0.5rem 0.75rem;color:#94a3b8">${ts}</td>
      </tr>`;
    }).join('') +
    `</tbody></table></div>`;

    list.innerHTML = header;

  } catch(e) {
    list.innerHTML = '<div style="text-align:center;padding:3rem;color:#ef4444">Failed: ' + e.message + '</div>';
  }
}
</script>
</body>
</html>
